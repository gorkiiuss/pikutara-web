version: '3.8'

services:
  txartelari_ez:
    build: .
    container_name: konpartsa_txartel_ez_web
    restart: unless-stopped
    ports:
      - "4300:80"
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    container_name: konpartsa_txartel_ez_api
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
