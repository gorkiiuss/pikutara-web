services:
  txartelari_ez:
    build: .
    container_name: konpartsa_txartel_ez_web
    restart: unless-stopped
    ports:
      - "4300:80"
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    container_name: konpartsa_txartel_ez_api
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
      - ./public:/public

  downloader:
    build: ./downloader
    container_name: konpartsa_txartel_ez_downloader
    volumes:
      - ./downloads:/app/downloads
      - ./backend/data:/app/data:ro
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:3000/api/musika/songs
      - DOWNLOAD_DIR=/app/downloads
      - COOKIES_PATH=/app/data/cookies.txt
    depends_on:
      - backend
