name: Continuous Deployment (CD)

on:
  release:
    types: [published]
  # Allows triggering the deployment manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/ubuntu/txartelari_ez

            # Fetch changes and switch to main
            git fetch --all
            git checkout main
            git pull origin main

            # Rebuild and restart the Docker containers in production mode
            docker compose down
            docker compose up --build -d